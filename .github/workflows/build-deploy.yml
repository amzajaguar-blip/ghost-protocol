name: Build & Deploy Ghost Protocol

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 7

  # ── APK Generation via PWA/TWA (Bubblewrap) ────────────
  apk:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Generate keystore
        run: |
          cd twa
          if [ ! -f android.keystore ]; then
            keytool -genkey -v \
              -keystore android.keystore \
              -alias ghost-protocol \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Ghost Protocol, OU=Dev, O=Ghost Protocol, L=Milan, ST=Italy, C=IT"
          fi

      - name: Initialize TWA project
        env:
          SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          cd twa
          # bubblewrap init fetches the PWA manifest from the live site
          # and creates a TWA project directory
          bubblewrap init --manifest="$SITE_URL/manifest.json" --directory=./twa-build 2>&1 || {
            echo "⚠ bubblewrap init failed — site may not be deployed yet"
            echo "Creating fallback project from local twa-manifest.json"
            mkdir -p twa-build
            cp twa-manifest.json twa-build/
          }

      - name: Build APK
        run: |
          cd twa/twa-build
          bubblewrap build 2>&1 || {
            echo "⚠ APK build failed — see logs above"
            exit 1
          }

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghost-protocol-apk
          path: twa/twa-build/*.apk
          retention-days: 30
